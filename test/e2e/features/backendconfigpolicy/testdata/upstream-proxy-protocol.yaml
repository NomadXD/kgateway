apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: example-route
  namespace: kgateway-base
spec:
  parentRefs:
    - name: gateway
      namespace: kgateway-base
  hostnames:
    - "example.com"
  rules:
    - backendRefs:
        - name: upstream-pp-svc
          port: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: upstream-pp-svc
  namespace: kgateway-base
spec:
  selector:
    app.kubernetes.io/name: nginx
  ports:
    - protocol: TCP
      port: 8080
      targetPort: http-web-svc
---
kind: BackendConfigPolicy
apiVersion: gateway.kgateway.dev/v1alpha1
metadata:
  name: upstream-pp-policy
  namespace: kgateway-base
spec:
  targetRefs:
    - name: upstream-pp-svc
      group: ""
      kind: Service
  upstreamProxyProtocol:
    version: V1
