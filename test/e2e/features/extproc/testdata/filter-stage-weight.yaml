---
# ExtProc server for high-weight filter: identifies itself via x-processed-by-high header
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ext-proc-high-server
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: ext-proc-high-server
  replicas: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ext-proc-high-server
    spec:
      containers:
        - name: ext-proc-high-server
          image: ghcr.io/kgateway-dev/extproc-server:0.0.1
          imagePullPolicy: IfNotPresent
          command: ["./server", "--add-header", "x-processed-by-high:true"]
          ports:
            - containerPort: 18080
---
apiVersion: v1
kind: Service
metadata:
  name: ext-proc-high-server
spec:
  ports:
    - port: 4444
      targetPort: 18080
      protocol: TCP
      appProtocol: kubernetes.io/h2c
  selector:
    app.kubernetes.io/name: ext-proc-high-server
---
# ExtProc server for low-weight filter: identifies itself via x-processed-by-low header
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ext-proc-low-server
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: ext-proc-low-server
  replicas: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ext-proc-low-server
    spec:
      containers:
        - name: ext-proc-low-server
          image: ghcr.io/kgateway-dev/extproc-server:0.0.1
          imagePullPolicy: IfNotPresent
          command: ["./server", "--add-header", "x-processed-by-low:true"]
          ports:
            - containerPort: 18080
---
apiVersion: v1
kind: Service
metadata:
  name: ext-proc-low-server
spec:
  ports:
    - port: 4444
      targetPort: 18080
      protocol: TCP
      appProtocol: kubernetes.io/h2c
  selector:
    app.kubernetes.io/name: ext-proc-low-server
---
# GatewayExtension with high weight (runs earlier in the chain)
apiVersion: gateway.kgateway.dev/v1alpha1
kind: GatewayExtension
metadata:
  name: ext-proc-high-weight
spec:
  extProc:
    grpcService:
      backendRef:
        name: ext-proc-high-server
        port: 4444
    filterStage:
      stage: AuthZ
      predicate: After
      weight: 10
---
# GatewayExtension with low weight (runs later in the chain)
apiVersion: gateway.kgateway.dev/v1alpha1
kind: GatewayExtension
metadata:
  name: ext-proc-low-weight
spec:
  extProc:
    grpcService:
      backendRef:
        name: ext-proc-low-server
        port: 4444
    filterStage:
      stage: AuthZ
      predicate: After
      weight: -5
---
# TrafficPolicy referencing high-weight ExtProc (used as inline filter)
apiVersion: gateway.kgateway.dev/v1alpha1
kind: TrafficPolicy
metadata:
  name: extproc-high
spec:
  extProc:
    extensionRef:
      name: ext-proc-high-weight
---
# TrafficPolicy referencing low-weight ExtProc (used as inline filter)
apiVersion: gateway.kgateway.dev/v1alpha1
kind: TrafficPolicy
metadata:
  name: extproc-low
spec:
  extProc:
    extensionRef:
      name: ext-proc-low-weight
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: route-weight-test
spec:
  parentRefs:
    - name: gw
  hostnames:
    - "www.example.com"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /both
      backendRefs:
        - name: backend
          port: 3000
      filters:
        - type: ExtensionRef
          extensionRef:
            group: gateway.kgateway.dev
            kind: TrafficPolicy
            name: extproc-high
        - type: ExtensionRef
          extensionRef:
            group: gateway.kgateway.dev
            kind: TrafficPolicy
            name: extproc-low
